name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install GNOME dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            desktop-file-utils \
            gettext \
            libadwaita-1-dev \
            libdbus-1-dev \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            meson \
            ninja-build \
            pkg-config \
            xdotool \
            xfwm4 \
            xvfb

      - name: Format
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Meson build
        run: |
          meson setup _build
          meson compile -C _build
          meson test -C _build
