name: CI

on:
  push:
    branches: [main]
  pull_request:
    # GitHub approval-gates workflows for pull requests created by GITHUB_TOKEN.
    # Release metadata is validated and dispatched at its exact SHA by release.yml.
    paths-ignore:
      - .release-please-manifest.json
      - CHANGELOG.md
      - Cargo.lock
      - Cargo.toml
      - data/eu.vanadrighem.conduit.metainfo.xml.in
      - meson.build
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exact trusted commit to validate
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install GNOME dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            desktop-file-utils \
            gettext \
            libadwaita-1-dev \
            libdbus-1-dev \
            libgstreamer-plugins-bad1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            meson \
            ninja-build \
            pkg-config \
            python3-gi \
            gir1.2-gdkpixbuf-2.0 \
            gir1.2-gtk-4.0 \
            gir1.2-webkit-6.0 \
            gstreamer1.0-libav \
            gstreamer1.0-nice \
            gstreamer1.0-pipewire \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            xclip \
            xdotool \
            xfwm4 \
            x11-utils \
            xvfb

      - name: Format
        run: cargo fmt --check

      - name: Lint GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Lint
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Lint native huddle stack
        run: cargo clippy --locked --all-targets --features native-media,screen-share,huddle-harness -- -D warnings

      - name: Meson build
        run: |
          meson setup _build -Dheadless_tests=enabled
          meson compile -C _build
          meson test -C _build --no-rebuild --print-errorlogs

      - name: Meson native huddle build
        run: |
          meson setup _build-huddles -Dnative_media=enabled -Dscreen_share=enabled -Dhuddle_harness=true -Dheadless_tests=enabled
          meson compile -C _build-huddles
          meson test -C _build-huddles --no-rebuild --print-errorlogs --suite rust --suite huddle-ui
