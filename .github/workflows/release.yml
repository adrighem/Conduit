name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      draft_tag:
        description: Existing draft release tag to rebuild and publish
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-please-main
  cancel-in-progress: false

env:
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_NET_RETRY: "10"
  RUST_VERSION: "1.97.1"

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.recovery.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.recovery.outputs.tag_name }}
      version: ${{ steps.release.outputs.version || steps.recovery.outputs.version }}
      sha: ${{ steps.release.outputs.sha || steps.recovery.outputs.sha }}
    steps:
      - name: Create or update release
        id: release
        if: github.event_name != 'workflow_dispatch' || inputs.draft_tag == ''
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Select existing draft release
        id: recovery
        if: github.event_name == 'workflow_dispatch' && inputs.draft_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DRAFT_TAG: ${{ inputs.draft_tag }}
        run: |
          if [[ ! "$DRAFT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::draft_tag must be a stable vMAJOR.MINOR.PATCH tag"
            exit 1
          fi
          if [[ "$(gh release view "$DRAFT_TAG" --json isDraft --jq .isDraft)" != "true" ]]; then
            echo "::error::$DRAFT_TAG is not an existing draft release"
            exit 1
          fi
          {
            echo "release_created=true"
            echo "tag_name=$DRAFT_TAG"
            echo "version=${DRAFT_TAG#v}"
            echo "sha=$GITHUB_SHA"
          } >> "$GITHUB_OUTPUT"

  build-deb:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    container: debian:trixie
    env:
      RUSTUP_HOME: /opt/rustup
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}
      - name: Install Debian build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            appstream build-essential ca-certificates cmake debhelper \
            desktop-file-utils gettext libadwaita-1-dev libdbus-1-dev \
            gir1.2-gdkpixbuf-2.0 libgdk-pixbuf-2.0-dev libgtk-4-dev \
            libwebkitgtk-6.0-dev lintian meson ninja-build pkgconf \
            python3 python3-gi rustup
          rustup toolchain install "$RUST_VERSION" --profile minimal
      - name: Build Debian package
        env:
          RUSTUP_TOOLCHAIN: ${{ env.RUST_VERSION }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          cp -a packaging/debian debian
          mv debian/changelog.in debian/changelog
          release_date=$(date -R)
          sed -i "s/@VERSION@/${VERSION}/g; s/@DATE@/${release_date}/g" debian/changelog
          dpkg-buildpackage --build=binary --no-sign
          mkdir -p dist
          mv "../conduit_${VERSION}-1_amd64.deb" dist/
          lintian --fail-on error "dist/conduit_${VERSION}-1_amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ needs.release-please.outputs.version }}-deb
          path: dist/*.deb
          if-no-files-found: error

  validate-deb:
    needs: [release-please, build-deb]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    container: debian:trixie
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: conduit-${{ needs.release-please.outputs.version }}-deb
          path: dist
      - name: Install and validate Debian package
        env:
          DEBIAN_FRONTEND: noninteractive
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            appstream binutils desktop-file-utils libglib2.0-bin
          apt-get install -y ./dist/*.deb
          dpkg-deb --info ./dist/*.deb
          dpkg-deb --contents ./dist/*.deb
          test "$(dpkg-query --showformat='${Version}' --show conduit)" = "${VERSION}-1"
          for path in \
            /usr/bin/conduit \
            /usr/share/applications/eu.vanadrighem.conduit.desktop \
            /usr/share/conduit/conduit.gresource \
            /usr/share/dbus-1/services/eu.vanadrighem.conduit.service \
            /usr/share/glib-2.0/schemas/eu.vanadrighem.conduit.gschema.xml \
            /usr/share/gnome-shell/search-providers/eu.vanadrighem.conduit.search-provider.ini \
            /usr/share/icons/hicolor/512x512/apps/eu.vanadrighem.conduit.png \
            /usr/share/metainfo/eu.vanadrighem.conduit.metainfo.xml; do
            test -e "$path"
          done
          grep -Fq "release version=\"${VERSION}\"" \
            /usr/share/metainfo/eu.vanadrighem.conduit.metainfo.xml
          if ldd /usr/bin/conduit | grep -q 'not found'; then exit 1; fi
          if readelf -d /usr/bin/conduit | grep -Eq '(RPATH|RUNPATH)'; then exit 1; fi
          glib-compile-schemas --strict --dry-run /usr/share/glib-2.0/schemas
          desktop-file-validate /usr/share/applications/eu.vanadrighem.conduit.desktop
          appstreamcli validate --no-net /usr/share/metainfo/eu.vanadrighem.conduit.metainfo.xml

  build-rpm:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - name: Install Fedora build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            --disablerepo=fedora-cisco-openh264 \
            appstream cargo cmake dbus-devel desktop-file-utils gcc gettext git \
            gdk-pixbuf2-devel gtk4-devel libadwaita-devel meson ninja-build \
            pkgconf-pkg-config python3-gobject rpm-build rpmlint rust \
            webkitgtk6.0-devel
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          fetch-depth: 0
      - name: Build RPM package
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          RELEASE_SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          rpm_root="${RUNNER_TEMP}/rpmbuild"
          mkdir -p "$rpm_root"/{BUILD,BUILDROOT,RPMS,SOURCES,SPECS,SRPMS}
          git archive --format=tar.gz --prefix="conduit-${VERSION}/" \
            --output="$rpm_root/SOURCES/conduit-${VERSION}.tar.gz" "$RELEASE_SHA"
          rpmbuild -bb \
            --define "_topdir $rpm_root" \
            --define "conduit_version $VERSION" \
            packaging/rpm/conduit.spec
          mkdir -p dist
          find "$rpm_root/RPMS" -name "conduit-${VERSION}-1.fc44.x86_64.rpm" \
            -exec cp -v {} dist/ \;
          test -f "dist/conduit-${VERSION}-1.fc44.x86_64.rpm"
          rpmlint "dist/conduit-${VERSION}-1.fc44.x86_64.rpm"
      - uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ needs.release-please.outputs.version }}-rpm
          path: dist/*.rpm
          if-no-files-found: error

  validate-rpm:
    needs: [release-please, build-rpm]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: conduit-${{ needs.release-please.outputs.version }}-rpm
          path: dist
      - name: Install and validate RPM package
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            --disablerepo=fedora-cisco-openh264 \
            appstream binutils desktop-file-utils glib2 rpmlint
          dnf install -y ./dist/*.rpm
          rpm -qip ./dist/*.rpm
          rpm -qlp ./dist/*.rpm
          rpmlint ./dist/*.rpm
          test "$(rpm -q --qf '%{VERSION}-%{RELEASE}' conduit)" = "${VERSION}-1.fc44"
          for path in \
            /usr/bin/conduit \
            /usr/share/applications/eu.vanadrighem.conduit.desktop \
            /usr/share/conduit/conduit.gresource \
            /usr/share/dbus-1/services/eu.vanadrighem.conduit.service \
            /usr/share/glib-2.0/schemas/eu.vanadrighem.conduit.gschema.xml \
            /usr/share/gnome-shell/search-providers/eu.vanadrighem.conduit.search-provider.ini \
            /usr/share/icons/hicolor/512x512/apps/eu.vanadrighem.conduit.png \
            /usr/share/metainfo/eu.vanadrighem.conduit.metainfo.xml; do
            test -e "$path"
          done
          grep -Fq "release version=\"${VERSION}\"" \
            /usr/share/metainfo/eu.vanadrighem.conduit.metainfo.xml
          if ldd /usr/bin/conduit | grep -q 'not found'; then exit 1; fi
          if readelf -d /usr/bin/conduit | grep -Eq '(RPATH|RUNPATH)'; then exit 1; fi
          glib-compile-schemas --strict --dry-run /usr/share/glib-2.0/schemas
          desktop-file-validate /usr/share/applications/eu.vanadrighem.conduit.desktop
          appstreamcli validate --no-net /usr/share/metainfo/eu.vanadrighem.conduit.metainfo.xml

  build-flatpak:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.sha }}
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: conduit-${{ needs.release-please.outputs.version }}-x86_64.flatpak
          manifest-path: packaging/flatpak/eu.vanadrighem.conduit.json
          cache-key: flatpak-builder-${{ needs.release-please.outputs.sha }}

  validate-flatpak:
    needs: [release-please, build-flatpak]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: conduit-${{ needs.release-please.outputs.version }}-*.flatpak
          path: dist
          merge-multiple: true
      - name: Install and validate Flatpak bundle
        env:
          APP_ID: eu.vanadrighem.conduit
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          bundle_count=$(find dist -maxdepth 1 -type f -name '*.flatpak' | wc -l)
          test "$bundle_count" -eq 1
          bundle=$(find dist -maxdepth 1 -type f -name '*.flatpak' -print -quit)
          flatpak install --system --noninteractive --assumeyes "$bundle"
          test "$(flatpak info --system --show-ref "$APP_ID")" = \
            "app/${APP_ID}/x86_64/master"
          test "$(flatpak info --system --show-runtime "$APP_ID")" = \
            "org.gnome.Platform/x86_64/50"
          test -n "$(flatpak info --system --show-commit "$APP_ID")"
          app_root="$(flatpak info --system --show-location "$APP_ID")/files"
          for path in \
            bin/conduit \
            share/applications/eu.vanadrighem.conduit.desktop \
            share/conduit/conduit.gresource \
            share/dbus-1/services/eu.vanadrighem.conduit.service \
            share/glib-2.0/schemas/eu.vanadrighem.conduit.gschema.xml \
            share/gnome-shell/search-providers/eu.vanadrighem.conduit.search-provider.ini \
            share/icons/hicolor/512x512/apps/eu.vanadrighem.conduit.png \
            share/metainfo/eu.vanadrighem.conduit.metainfo.xml; do
            test -e "${app_root}/${path}"
          done
          grep -Fq "release version=\"${VERSION}\"" \
            "${app_root}/share/metainfo/eu.vanadrighem.conduit.metainfo.xml"
          flatpak info --system --show-permissions "$APP_ID" > permissions.ini
          if grep -Fq pulseaudio permissions.ini; then exit 1; fi
          flatpak run --system --command=sh "$APP_ID" -c \
            'test -x /app/bin/conduit && test -f /app/share/conduit/conduit.gresource'

  publish-assets:
    needs:
      - release-please
      - build-deb
      - validate-deb
      - build-rpm
      - validate-rpm
      - build-flatpak
      - validate-flatpak
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: conduit-${{ needs.release-please.outputs.version }}-*
          path: dist
          merge-multiple: true
      - name: Publish verified release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_SHA: ${{ needs.release-please.outputs.sha }}
        run: |
          cd dist
          sha256sum -- *.deb *.rpm *.flatpak > SHA256SUMS
          gh release upload "$TAG_NAME" --clobber -- *.deb *.rpm *.flatpak SHA256SUMS
          gh release edit "$TAG_NAME" --target "$RELEASE_SHA" --draft=false --latest
