<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Conduit primary logo</title>
  <desc id="desc">Two conversation bubbles connected by a curved conduit pipe, followed by the Conduit wordmark and tagline.</desc>

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8BD448"/>
      <stop offset="1" stop-color="#5DBB2F"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6B7280"/>
      <stop offset="1" stop-color="#2F3542"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="#FFFFFF"/>

  <!-- Left conversation bubble -->
  <g filter="url(#softShadow)">
    <path d="M150 105
             C150 73 176 47 208 47
             H310
             C342 47 368 73 368 105
             V163
             C368 195 342 221 310 221
             H278
             L245 252
             V221
             H208
             C176 221 150 195 150 163 Z"
          fill="url(#blueGrad)"/>
    <circle cx="216" cy="136" r="11" fill="#FFFFFF"/>
    <circle cx="259" cy="136" r="11" fill="#FFFFFF"/>
    <circle cx="302" cy="136" r="11" fill="#FFFFFF"/>
  </g>

  <!-- Right conversation bubble -->
  <g filter="url(#softShadow)">
    <path d="M575 105
             C575 73 601 47 633 47
             H735
             C767 47 793 73 793 105
             V163
             C793 195 767 221 735 221
             H710
             V252
             L677 221
             H633
             C601 221 575 195 575 163 Z"
          fill="url(#greenGrad)"/>
    <circle cx="641" cy="136" r="11" fill="#FFFFFF"/>
    <circle cx="684" cy="136" r="11" fill="#FFFFFF"/>
    <circle cx="727" cy="136" r="11" fill="#FFFFFF"/>
  </g>

  <!-- Conduit pipe -->
  <g fill="none" stroke="url(#pipeGrad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 220
             C250 278 286 314 344 314
             H470"/>
    <path d="M347 314
             C347 244 390 196 460 196
             H623
             C658 196 678 218 714 218
             C734 218 749 212 761 203"/>
  </g>

  <!-- Pipe coupling -->
  <g filter="url(#softShadow)">
    <rect x="456" y="174" width="34" height="56" rx="7" fill="#202631"/>
    <rect x="462" y="176" width="11" height="52" rx="5" fill="#4B5563" opacity="0.65"/>
  </g>

  <!-- Wordmark -->
  <text x="795" y="320"
        font-family="Inter, Avenir Next, Segoe UI, Arial, sans-serif"
        font-size="128"
        font-weight="700"
        letter-spacing="-4"
        fill="#2B313B">conduit</text>

  <!-- Tagline -->
  <text x="520" y="410"
        font-family="Inter, Avenir Next, Segoe UI, Arial, sans-serif"
        font-size="42"
        font-weight="500"
        fill="#596273">Bridge conversations. Build understanding.</text>
</svg>
